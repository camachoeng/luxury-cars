<header class="sticky top-0 z-50 w-full border-b border-slate-800 bg-[#0A0F16]/90 backdrop-blur-md">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4 md:px-10">
    <!-- Logo — wordmark only -->
    <a href="{{baseUrl}}" class="flex items-center">
      <span class="text-xl font-bold tracking-tight text-white">YMV <span class="text-[#C5A059]">Limo</span></span>
    </a>

    <!-- Nav -->
    <nav class="hidden items-center gap-10 md:flex">
      <a href="{{baseUrl}}pages/fleet.html" class="text-sm font-medium text-slate-300 transition-colors hover:text-[#C5A059]">
        <span data-i18n="nav.fleet">Fleet</span>
      </a>
      <a href="{{baseUrl}}pages/about.html" class="text-sm font-medium text-slate-300 transition-colors hover:text-[#C5A059]">
        <span data-i18n="nav.about">About</span>
      </a>
      <a href="{{baseUrl}}pages/contact.html" class="text-sm font-medium text-slate-300 transition-colors hover:text-[#C5A059]">
        <span data-i18n="nav.contact">Contact</span>
      </a>
    </nav>

    <!-- Actions -->
    <div class="flex items-center gap-3">
      <!-- Language toggle -->
      <button id="lang-toggle"
              class="hidden rounded border border-slate-600 bg-transparent px-2.5 py-1 text-xs font-bold uppercase tracking-widest text-slate-300 transition-colors hover:border-[#C5A059] hover:text-[#C5A059] sm:block"
              aria-label="Toggle language">
        ES
      </button>
      <a href="{{baseUrl}}pages/fleet.html"
         class="hidden rounded-lg bg-[#1152d4] px-5 py-2.5 text-sm font-semibold text-white shadow-lg shadow-[#1152d4]/20 transition-all hover:bg-[#0d3fa8] sm:flex">
        <span data-i18n="nav.book_now">Book Now</span>
      </a>
      <a id="nav-admin-btn" href="{{baseUrl}}pages/admin.html"
         class="hidden items-center gap-1.5 rounded-lg border border-[#C5A059]/40 bg-[#C5A059]/10 px-3 py-1.5 text-xs font-bold text-[#C5A059] transition-colors hover:bg-[#C5A059]/20">
        <span class="material-symbols-outlined text-sm">admin_panel_settings</span>
        Admin
      </a>
      <!-- User menu -->
      <div class="relative">
        <button id="nav-user-btn"
                class="flex h-10 w-10 items-center justify-center rounded-full border border-slate-700 bg-[#161C28] text-slate-300 transition-colors hover:border-[#1152d4] hover:text-[#1152d4]">
          <span class="material-symbols-outlined text-xl">person</span>
        </button>
        <!-- Dropdown (logged-in only) -->
        <div id="nav-user-dropdown"
             class="absolute right-0 top-12 hidden w-48 rounded-xl border border-slate-700 bg-[#161C28] py-1 shadow-xl shadow-black/40">
          <a id="nav-my-bookings-link" href="{{baseUrl}}pages/my-bookings.html"
             class="flex items-center gap-2 px-4 py-2.5 text-sm text-slate-300 hover:bg-[#1e2738] hover:text-white">
            <span class="material-symbols-outlined text-base">receipt_long</span>
            <span data-i18n="common.my_bookings">My Bookings</span>
          </a>
          <button id="nav-signout-btn"
                  class="flex w-full items-center gap-2 px-4 py-2.5 text-sm text-slate-300 hover:bg-[#1e2738] hover:text-white">
            <span class="material-symbols-outlined text-base">logout</span>
            <span data-i18n="common.sign_out">Sign Out</span>
          </button>
        </div>
      </div>
      <!-- Mobile menu button -->
      <button id="nav-mobile-btn"
              class="flex h-10 w-10 items-center justify-center rounded-full border border-slate-700 bg-[#161C28] text-slate-300 md:hidden">
        <span class="material-symbols-outlined">menu</span>
      </button>
    </div>
  </div>

  <!-- Mobile menu -->
  <div id="nav-mobile-menu" class="hidden border-t border-slate-800 bg-[#0A0F16] px-6 pb-4 md:hidden">
    <nav class="flex flex-col gap-1 pt-4">
      <a href="{{baseUrl}}pages/fleet.html" class="rounded-lg px-4 py-3 text-sm font-medium text-slate-300 hover:bg-[#161C28] hover:text-white">
        <span data-i18n="nav.fleet">Fleet</span>
      </a>
      <a href="{{baseUrl}}pages/about.html" class="rounded-lg px-4 py-3 text-sm font-medium text-slate-300 hover:bg-[#161C28] hover:text-white">
        <span data-i18n="nav.about">About</span>
      </a>
      <a href="{{baseUrl}}pages/contact.html" class="rounded-lg px-4 py-3 text-sm font-medium text-slate-300 hover:bg-[#161C28] hover:text-white">
        <span data-i18n="nav.contact">Contact</span>
      </a>
      <a href="{{baseUrl}}pages/fleet.html"
         class="mt-2 rounded-lg bg-[#1152d4] px-4 py-3 text-center text-sm font-semibold text-white">
        <span data-i18n="nav.book_now">Book Now</span>
      </a>
    </nav>
  </div>
</header>
